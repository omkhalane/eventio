# ============================================================================
# Eventio - Local Development Stack
# ============================================================================
# Default: PostgreSQL + Redis only.
# Optional app image: docker compose --profile app up --build api
# Optional pooler:    docker compose --profile pooling up -d pgbouncer
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventio
      POSTGRES_INITDB_ARGS: '-c max_connections=200 -c shared_buffers=256MB'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/drizzle:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eventio-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: eventio-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eventio-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: eventio-pgbouncer
    profiles:
      - pooling
    restart: unless-stopped
    ports:
      - '6432:6432'
    environment:
      PGBOUNCER_DATABASES: 'eventio = host=postgres port=5432 user=postgres password=postgres dbname=eventio'
      PGBOUNCER_POOL_MODE: 'transaction'
      PGBOUNCER_MAX_CLIENT_CONN: '1000'
      PGBOUNCER_MIN_POOL_SIZE: '10'
      PGBOUNCER_DEFAULT_POOL_SIZE: '25'
      PGBOUNCER_RESERVE_POOL_SIZE: '5'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eventio-network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  api:
    build:
      context: .
      target: runner
    container_name: eventio-api
    profiles:
      - app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventio
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventio
      REDIS_URL: redis://redis:6379
      PUBLIC_SITE_URL: http://localhost:5175
      PUBLIC_API_BASE_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventio-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  eventio-network:
    driver: bridge

# ============================================================================
# Usage:
#
# Start local infrastructure:
#   docker compose up -d
#
# Start infrastructure plus API container:
#   docker compose --profile app up --build
#
# View logs:
#   docker compose logs -f
#
# Stop services:
#   docker compose down
#
# Remove volumes (careful!):
#   docker compose down -v
#
# ============================================================================
