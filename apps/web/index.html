<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventio | Developer Events, Hackathons, and Contests</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="Eventio | Developer Events, Hackathons, and Contests" />
    <meta
      name="description"
      content="Discover developer events, hackathons, coding contests, and tech conferences with production-grade search and SEO-rich event pages."
    />
    <meta
      name="keywords"
      content="eventio, calendar, developer events, competitive programming, hackathons, coding contests, codeforces, leetcode, atcoder, devpost, tech conferences, hiring challenges, tech calendar"
    />
    <meta name="author" content="Om Khalane" />
    <meta name="email" content="om.khalane.dev@gmail.com" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="https://event-io.me/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://event-io.me/" />
    <meta property="og:title" content="Eventio | Developer Events, Hackathons, and Contests" />
    <meta
      property="og:description"
      content="Aggregating developer events into one high-performance dashboard. Track Codeforces, LeetCode, Devpost, MLH, and more."
    />
    <meta property="og:image" content="https://event-io.me/assets/og-image.png" />
    <meta property="og:logo" content="https://event-io.me/assets/logo.svg" />
    <meta property="og:site_name" content="Eventio by Om Khalane" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://event-io.me/" />
    <meta property="twitter:title" content="Eventio | Developer Events, Hackathons, and Contests" />
    <meta
      property="twitter:description"
      content="The ultimate dashboard for elite programmers. Track global coding contests and hackathons in real-time."
    />
    <meta property="twitter:image" content="https://event-io.me/assets/og-image.png" />
    <meta property="twitter:creator" content="@omkhalane" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Eventio by Om Khalane",
        "operatingSystem": "Web",
        "applicationCategory": "DeveloperApplication",
        "description": "Developer event discovery platform for competitions, hackathons, conferences, and coding contests.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Organization",
          "name": "Om Khalane",
          "url": "https://github.com/omkhalane"
        },
        "keywords": "Competitive Programming, Hackathons, Tech Conferences, Coding Contests, Event Aggregator",
        "applicationSubCategory": "Productivity Tool"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Eventio",
        "url": "https://event-io.me/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://event-io.me/calendar?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <script>
      // Initialize default config for local development
      if (!window.__EVENTIO_CONFIG__) {
        window.__EVENTIO_CONFIG__ = {};
      }

      // Show loading indicator
      document.addEventListener('DOMContentLoaded', function () {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #fcfcfc; font-family: 'Inter', sans-serif;">
              <div style="animation: spin 2s linear infinite; margin-bottom: 20px;">
                <div style="width: 48px; height: 48px; border: 3px solid #f0f0f0; border-top: 3px solid #1a1a1a; border-radius: 50%;"></div>
              </div>
              <h2 style="font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 0;">Loading Calendar...</h2>
              <p style="font-size: 12px; color: #999; margin-top: 8px;">Initializing application</p>
            </div>
            <style>
              @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
              }
            </style>
          `;
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
