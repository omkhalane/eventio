<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CALENDAR | Universal Tech Event Aggregator for Developers</title>

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="CALENDAR | Universal Tech Event Aggregator for Developers"
    />
    <meta
      name="description"
      content="The definitive developer dashboard for tracking Competitive Programming, Global Hackathons, Tech Conferences, and Hiring Challenges worldwide. One high-performance schedule."
    />
    <meta
      name="keywords"
      content="calendar, developer events, competitive programming, hackathons, coding contests, codeforces, leetcode, atcoder, devpost, tech conferences, hiring challenges, algorithmic os, tech calendar"
    />
    <meta name="author" content="Algorithmic OS" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://calendar-alpha-two.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calendar-alpha-two.vercel.app/" />
    <meta
      property="og:title"
      content="CALENDAR | Universal Tech Event Aggregator"
    />
    <meta
      property="og:description"
      content="Aggregating 50+ platforms into one high-performance dashboard. Track Codeforces, LeetCode, Devpost, MLH, and more."
    />
    <meta
      property="og:image"
      content="https://calendar-alpha-two.vercel.app/hero.png"
    />
    <meta property="og:site_name" content="CALENDAR by Algorithmic OS" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://calendar-alpha-two.vercel.app/"
    />
    <meta
      property="twitter:title"
      content="CALENDAR | Universal Tech Event Aggregator"
    />
    <meta
      property="twitter:description"
      content="The ultimate dashboard for elite programmers. Track all global coding contests and hackathons in real-time."
    />
    <meta
      property="twitter:image"
      content="https://calendar-alpha-two.vercel.app/hero.png"
    />
    <meta property="twitter:creator" content="@algorithmicOS" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "CALENDAR by Algorithmic OS",
        "operatingSystem": "Web",
        "applicationCategory": "DeveloperApplication",
        "description": "Universal Tech Event Aggregator for Developers. Tracking Competitive Programming, Hackathons, and Conferences.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Organization",
          "name": "Algorithmic OS",
          "url": "https://github.com/algorithmicOS"
        },
        "keywords": "Competitive Programming, Hackathons, Tech Conferences, Coding Contests, Event Aggregator",
        "applicationSubCategory": "Productivity Tool"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CALENDAR",
        "url": "https://calendar-alpha-two.vercel.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://calendar-alpha-two.vercel.app/calendar?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
