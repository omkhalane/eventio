name: Maintenance task
description: Track repository hygiene, CI, tooling, dependencies, or refactors.
title: "chore: "
labels: ["maintenance", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CI / GitHub Actions
        - Dependencies
        - Tooling
        - Refactor
        - Repository metadata
        - Documentation structure
        - Other
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be cleaned up or maintained?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why does this matter for maintainability, reliability, or contributor experience?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What should be true when this is done?
