name: Bug report
description: Report a reproducible problem in Eventio.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Eventio. Please include enough detail for a maintainer to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: "The calendar view fails when..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Scraper service
        - Documentation
        - CI / tooling
        - SEO / metadata
        - Unknown
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, browser, Node version, Python version"

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant logs or attach screenshots. Remove secrets first.
      render: shell
