name: Feature request
description: Suggest a product, platform, or developer-experience improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem does this solve?
      placeholder: "Developers need..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior or design.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Scraper service
        - API / backend
        - Documentation
        - CI / tooling
        - SEO / discoverability
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional. What other approaches did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, prior art, or implementation notes.
