name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.repository_owner == 'omkhalane'
    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v5
        with:
          release-type: node
