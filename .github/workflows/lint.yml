name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  scraper:
    name: Scraper checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install scraper dependencies
        run: pip install -r services/scraper/requirements.txt

      - name: Compile scraper modules
        run: python -m compileall services/scraper

      - name: Verify scraper registry
        run: python -m services.scraper.main --list
